name: "Fing Agent"
version: "1.1.1"
slug: "fing-agent"
description: "Run Fing Agent inside Home Assistant OS as an add-on."
url: "https://github.com/mirarus/ha-fing-agent"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
host_network: true
privileged:
  - NET_ADMIN
ports:
  44444/tcp: 44444
image: "fing/fing-agent"
map:
  - config:rw
  - share:rw
options: {}
schema: {}
